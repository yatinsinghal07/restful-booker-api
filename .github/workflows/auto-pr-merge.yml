on :
    push:
        branches:
            - "feature/**"
            - "test/**"
permissions:
    contents: read
    pull-requests: write

jobs:
    auto-pr-merge:
        if: github.ref.name != 'main'
        runs-on: ubuntu-latest

        steps:
          - name: create Pull request and enable Auto merge
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                BranchName: ${{ github.ref_name }}
                REPO_NAME: ${{ github.repository }}
            run: |
                PR_URL = $(gh pr list \ 
                -- repo "$REPO_NAME" \
                -- head "$BranchName" \
                --base main \
                -- state open \
                -- json url \
                -- jq -r '.[0].url')
                if[ -z "$PR_URL" ]; then
                    echo "No open PR found for branch $BranchName. Creating a new PR..."
                    (gh pr create \
                    -- repo "$REPO_NAME" \
                    -- head "$BranchName" \
                    -- base main \
                    -- title "Auto PR for $BranchName" \
                    -- body "This is an auto-generated PR for branch $BranchName.")
                fi
                echo "Open PR already exists: $PR_URL"

                gh pr merge "$PR_URL" --auto --squash --delete-branch
