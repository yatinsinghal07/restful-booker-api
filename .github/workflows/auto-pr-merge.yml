name: Auto PR and Auto Merge

on:
  push:
    branches:
      - "feature/**"
      - "test-*"

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-pr-merge:
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Create PR, wait for checks, merge, and trigger deploy
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.repository }}
        run: |
          PR_URL=$(gh pr list --repo "$REPO_NAME" --head "$BRANCH_NAME" --base main --state open --json url --jq '.[0].url')

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --repo "$REPO_NAME" --base main --head "$BRANCH_NAME" --title "Auto PR: $BRANCH_NAME" --body "Auto-created PR from branch: $BRANCH_NAME")
          fi

          echo "Pull Request: $PR_URL"

          PR_NUMBER=$(gh pr view "$PR_URL" --repo "$REPO_NAME" --json number --jq '.number')

          echo "Waiting for required checks to pass..."
          sleep 20
          gh pr checks "$PR_NUMBER" --repo "$REPO_NAME" --required --watch --fail-fast

          echo "Merging PR..."
          gh pr merge "$PR_NUMBER" --repo "$REPO_NAME" --squash --delete-branch

          echo "Triggering Playwright workflow on main..."
          gh workflow run playwright.yml --repo "$REPO_NAME" --ref main