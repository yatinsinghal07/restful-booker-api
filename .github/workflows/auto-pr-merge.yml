name: Auto PR and Auto Merge

on:
  push:
    branches:
      - "feature/**"
      - "test-*"

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-pr-merge:
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Create PR and Enable Auto Merge
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.repository }}
        run: |
          PR_URL=$(gh pr list --repo "$REPO_NAME" --head "$BRANCH_NAME" --base main --state open --json url --jq '.[0].url')

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --repo "$REPO_NAME" --base main --head "$BRANCH_NAME" --title "Auto PR: $BRANCH_NAME" --body "Auto-created PR from branch: $BRANCH_NAME")
          fi

          echo "Pull Request: $PR_URL"

          gh pr merge "$PR_URL" --auto --squash --delete-branch
