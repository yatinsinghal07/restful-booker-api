name: Playwright API Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check project files
        run: |
          ls -la
          cat package.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # API tests ke liye browser install required nahi hota.
      # Agar UI tests bhi hain, tab uncomment karna.
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps chromium

      - name: Run Playwright API tests
        run: npx playwright test --reporter=html

      # Backup artifact - Actions tab se download kar sakte ho
      - name: Upload Playwright HTML report as backup
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # GitHub Pages deployment ke liye actual artifact
      - name: Upload report for GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: playwright-report/

  deploy:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

