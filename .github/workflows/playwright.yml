name: Playwright API Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright API tests
        run: npx playwright test --reporter=html

      - name: Upload Playwright HTML report as backup
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload report for GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v5
        with:
          path: playwright-report/

  results:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "Tests passed successfully."
            exit 0
          else
            echo "Tests failed. Please check the Playwright report for details."
            exit 1
          fi

  notify-test:
    needs: [test, results]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    env:
      GMAIL_ID: ${{ secrets.GMAIL_ID }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v6
        with:
          name: playwright-report
          path: playwright-report

      - name: Zip Playwright report
        run: zip -r playwright-report.zip playwright-report

      - name: Send test result email with report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.GMAIL_ID }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          to: ${{ env.GMAIL_ID }}
          from: GitHub Actions <${{ env.GMAIL_ID }}>
          subject: "[${{ needs.results.result == 'success' && 'PASSED' || 'FAILED' }}] Playwright Test Report - main"
          body: |
            Playwright API Test Run Complete!

            Status     : ${{ needs.results.result == 'success' && 'PASSED' || 'FAILED' }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered  : ${{ github.event_name }}
            Run URL    : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Playwright HTML report is attached as ZIP file.
            Artifact backup is also available in GitHub Actions run.
          attachments: playwright-report.zip

  deploy:
    needs: results
    if: needs.results.result == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-deploy:
    needs: deploy
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.deploy.result != 'skipped'
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    env:
      GMAIL_ID: ${{ secrets.GMAIL_ID }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Send deploy result email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.GMAIL_ID }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          to: ${{ env.GMAIL_ID }}
          from: GitHub Actions <${{ env.GMAIL_ID }}>
          subject: "[${{ needs.deploy.result == 'success' && 'DEPLOYED' || 'DEPLOY FAILED' }}] Playwright Report Published - main"
          body: |
            Playwright Report Deploy Complete!

            Status     : ${{ needs.deploy.result == 'success' && 'DEPLOYED' || 'FAILED' }}
            Branch     : ${{ github.ref_name }}
            Report URL : ${{ needs.deploy.outputs.page_url }}
            Run URL    : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Live report is published on GitHub Pages.