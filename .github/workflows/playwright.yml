# This workflow runs your Playwright API tests automatically
# whenever you push code to the main branch

name: Playwright API Tests        # Name shown on GitHub Actions tab

on:                               # TRIGGER — when should this run?
  push:
    branches: [main]              # Run on every push to main
  workflow_dispatch:              # Also allows manual trigger from GitHub UI

jobs:                             # A pipeline is made of jobs
  test:                           # This job is called "test"
    runs-on: ubuntu-latest        # GitHub spins up a fresh Linux machine

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci

    # ADD THIS DEBUG STEP
    - name: Debug - check node_modules
      run: |
        echo "Current directory:"
        pwd
        echo "Files in root:"
        ls -la
        echo "node_modules exists?"
        ls node_modules/@playwright 2>/dev/null && echo "YES" || echo "NO - node_modules missing!"

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
