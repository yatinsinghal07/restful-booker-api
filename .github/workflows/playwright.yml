# This workflow runs your Playwright API tests automatically
# whenever you push code to the main branch

name: Playwright API Tests        # Name shown on GitHub Actions tab

on:                               # TRIGGER — when should this run?
  push:
    branches: [main]              # Run on every push to main
  workflow_dispatch:              # Also allows manual trigger from GitHub UI

jobs:                             # A pipeline is made of jobs
  test:                           # This job is called "test"
    runs-on: ubuntu-latest        # GitHub spins up a fresh Linux machine

    steps:                        # Steps run one by one inside the job

      # 1. Download your code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node.js (Playwright needs it)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install your project dependencies (from package-lock.json)
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers (only Chromium needed for API tests)
      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      # 5. Run all your tests
      - name: Run Playwright tests
        run: ./node_modules/.bin/playwright test

      # 6. Upload the HTML report so you can download it from GitHub
      - name: Upload test report
        if: always()              # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7       # Report stays available for 7 days
